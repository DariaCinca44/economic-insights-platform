services:
  db:
    image: postgres:16
    container_name: econ_db
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    ports:
      - "5433:5432"
    volumes:
      - econ_db_data:/var/lib/postgresql/data
volumes:
  econ_db_data: